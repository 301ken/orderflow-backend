spring.application.name=orderflow
# PostgreSQL Configuration (Commented out by default to allow H2 fallback if no env vars)
# spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderflow_db}
# spring.datasource.username=${DB_USERNAME:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Configuration for Local Run without Environment Variables
spring.datasource.url=${DB_URL:jdbc:h2:mem:orderflow_db;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

security.user.name=${APP_USERNAME:admin}
security.user.password=${APP_PASSWORD:admin123}
security.jwt.secret=${JWT_SECRET:b3JkZXJmbG93LWp3dC1zZWNyZXQtbXVzdC1iZS0zMmJ5dGVzLXNpemVkLTAx}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}